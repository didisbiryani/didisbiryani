<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/security.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Didi's Biryani</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Great+Vibes&family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDac0HRwWL2pvJZCO3TOE6rwwl_FuYpfbc&libraries=places"></script>
</head>
<body class="bg-brand-black text-brand-white min-h-screen flex flex-col">

    <!-- Simple Header -->
    <nav class="sticky top-0 w-full z-50 bg-[#0a0a0add] backdrop-blur-md border-b border-white/10 py-4">
        <div class="max-w-3xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <i data-lucide="arrow-left" class="text-brand-white/70 hover:text-white transition-colors w-5 h-5"></i>
            </a>
            <div class="text-lg font-black tracking-tighter text-brand-white">
                Live <span class="text-brand-gold">Tracking</span>
            </div>
            <div class="w-5"></div>
        </div>
    </nav>

    <!-- Main Tracking Area -->
    <main class="flex-grow max-w-3xl w-full mx-auto p-4 sm:p-6 flex flex-col gap-6">
        
        <!-- Loading State -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <i data-lucide="loader-2" class="w-12 h-12 text-brand-gold animate-spin mb-4"></i>
            <p class="text-brand-white/50 font-bold">Fetching your order...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="w-16 h-16 rounded-full bg-brand-red/20 flex items-center justify-center text-brand-red mb-4">
                <i data-lucide="alert-circle" class="w-8 h-8"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">Order Not Found</h2>
            <p id="error-message" class="text-brand-white/50 text-sm mb-6">We couldn't locate this order.</p>
            <a href="index.html" class="px-6 py-3 bg-brand-gold text-black font-bold rounded-xl hover:bg-white transition-colors">Go Home</a>
        </div>

        <!-- Tracking Content -->
        <div id="tracking-content" class="hidden flex-col gap-6 w-full">
            
            <!-- Map Header / Hero -->
            <div id="tracking-map-container" class="w-full h-64 rounded-3xl bg-black/50 border border-white/10 relative overflow-hidden flex flex-col shadow-lg">
                <!-- Map will be rendered here -->
            </div>

            <!-- Delivery Boy Details -->
            <div id="delivery-boy-card" class="hidden glass border border-brand-gold/30 rounded-3xl p-5 bg-gradient-to-r from-brand-gold/10 to-transparent">
                <p class="text-[10px] text-brand-gold uppercase tracking-wider font-bold mb-3">Delivery Partner Assigned</p>
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-full bg-brand-gold/20 flex flex-shrink-0 items-center justify-center border border-brand-gold shadow-[0_0_15px_rgba(212,160,23,0.3)]">
                        <i data-lucide="bike" class="w-7 h-7 text-brand-gold"></i>
                    </div>
                    <div class="flex-grow">
                        <h3 id="db-name" class="text-xl font-black text-white leading-tight">Name</h3>
                        <p class="text-xs text-brand-white/60">Your order is safe with him</p>
                    </div>
                    <a id="db-call-btn" href="#" class="w-12 h-12 rounded-full bg-green-500 text-black flex items-center justify-center hover:bg-green-400 hover:scale-105 transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)] flex-shrink-0">
                        <i data-lucide="phone" class="w-5 h-5 fill-current"></i>
                    </a>
                </div>
            </div>

            <!-- Vertical Timeline -->
            <div class="glass border border-white/10 rounded-3xl p-6 md:p-8 relative overflow-hidden">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-brand-gold/5 rounded-full blur-3xl"></div>
                <h3 class="text-lg font-black text-white mb-6">Order Status</h3>
                
                <div id="vertical-timeline" class="relative pl-4 space-y-6">
                    <!-- Dynamic timeline injected here -->
                </div>
            </div>

            <!-- Order Summary -->
            <div class="glass border border-white/10 rounded-3xl p-6">
                <div class="flex justify-between items-end mb-4 border-b border-white/5 pb-4">
                    <div>
                        <h3 class="text-sm font-bold text-brand-white/50 uppercase tracking-widest mb-1">Order #<span id="summary-order-id"></span></h3>
                        <p id="summary-date" class="text-xs text-brand-white/70">Date</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-brand-white/50 uppercase tracking-widest mb-1">Total</p>
                        <p id="summary-total" class="text-lg font-black text-brand-gold">₹0.00</p>
                    </div>
                </div>
                
                <div id="summary-items" class="space-y-3">
                    <!-- Items injected here -->
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="js/toast.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/tracking.js"></script>
</body>
</html>
